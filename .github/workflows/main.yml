name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # ✅ Configure AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # ✅ Login to ECR
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # ✅ Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.1_Linux-64bit.deb

      # ================= BACKEND =================

      - name: Build Backend Image
        run: docker build -t backend ./backend

      - name: Scan Backend Image
        run: trivy image backend

      - name: Tag Backend Image
        run: |
          docker tag backend:latest ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_BACKEND_REPO }}:latest
          docker tag backend:latest ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_BACKEND_REPO }}:${{ github.sha }}

      - name: Push Backend Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_BACKEND_REPO }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_BACKEND_REPO }}:${{ github.sha }}

      # ================= FRONTEND =================

      - name: Build Frontend Image
        run: |
          docker build -t frontend ./frontend \
            --build-arg VITE_BACKEND_URL=/api

      - name: Scan Frontend Image
        run: trivy image frontend

      - name: Tag Frontend Image
        run: |
          docker tag frontend:latest ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_FRONTEND_REPO }}:latest
          docker tag frontend:latest ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_FRONTEND_REPO }}:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_FRONTEND_REPO }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_FRONTEND_REPO }}:${{ github.sha }}

      # ================= OPTIONAL DEPLOY =================

      - name: Copy Configs to Server
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,prometheus.yml"
          target: "~/app"

      - name: Deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/app
            docker login -u AWS -p $(aws ecr get-login-password --region ${{ vars.AWS_REGION }}) ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
            docker-compose pull
            docker-compose up -d
            sleep 10
            docker image prune -f
