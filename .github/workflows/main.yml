name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      BACKEND_REPO: linkedin-backend
      FRONTEND_REPO: linkedin-frontend
      ECS_SERVICE: linkedin-service
      ECS_CLUSTER: linkedin-cluster
      TASK_DEFINITION: task-definition.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ Login to ECR
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # ✅ Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.1_Linux-64bit.deb

      # ================= BACKEND =================

      - name: Build Backend Image
        run: |
          docker build -t backend ./backend

      - name: Scan Backend Image
        run: |
          trivy image --exit-code 1 --severity HIGH,CRITICAL backend

      - name: Tag Backend Image
        run: |
          docker tag backend:latest ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:latest
          docker tag backend:latest ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ github.sha }}

      - name: Push Backend Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ github.sha }}

      # ================= FRONTEND =================

      - name: Build Frontend Image
        run: |
          docker build -t frontend ./frontend \
            --build-arg VITE_BACKEND_URL=/api

      - name: Scan Frontend Image
        run: |
          trivy image --exit-code 1 --severity HIGH,CRITICAL frontend

      - name: Tag Frontend Image
        run: |
          docker tag frontend:latest ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:latest
          docker tag frontend:latest ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:${{ github.sha }}

      # ================= ECS DEPLOY =================

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
